<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>寶寶翻倍計算機｜Rich Cherie</title>
  <meta name="description" content="寶寶翻倍計算機" />
  <meta property="og:title" content="寶寶翻倍計算機｜Rich Cherie" />
  <meta property="og:description" content="寶寶翻倍計算機" />
  <meta property="og:type" content="website" />
  <style>
    :root{
      --bg:#f6f1e8;
      --paper:#fffaf4;
      --card:#fffdf9;
      --card-2:#f9f1e6;
      --line:#eadcca;
      --text:#1f1b18;
      --sub:#7b7067;
      --gold:#b88a53;
      --dark:#26211d;
      --green:#178655;
      --green-soft:#edf8f1;
      --red:#c63c4d;
      --red-soft:#fff2f4;
      --shadow:0 16px 36px rgba(90,62,34,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:linear-gradient(180deg,#fdf9f3 0%,#f6f1e8 100%);color:var(--text);line-height:1.7}
    .wrap{max-width:1020px;margin:0 auto;padding:14px 12px 56px}
    .hero,.section{background:var(--paper);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow)}
    .hero{padding:20px 18px}
    .section{padding:16px 14px;margin-top:14px}
    .banner{display:block;text-align:center;padding:10px 14px;margin-bottom:14px;border-radius:999px;background:linear-gradient(135deg,#fff9f1 0%,#f1dfc6 100%);border:1px solid var(--line);color:#9c6d3e;font-weight:800;letter-spacing:.08em}
    .brand{background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:24px;padding:16px;margin-bottom:16px}
    .brand-title{font-size:1.12rem;font-weight:800;margin-bottom:8px}
    .brand-sub{color:var(--sub);margin-bottom:6px}
    .ig-link{display:inline-flex;align-items:center;gap:8px;margin-top:10px;padding:10px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);color:#8a5b2f;font-weight:700;text-decoration:none}
    .ig-icon{width:18px;height:18px}
    .hero-top{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;text-align:center}
    .pill{display:inline-block;padding:7px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--gold);font-size:.82rem;font-weight:800;letter-spacing:.06em}
    h1{font-size:1.78rem;line-height:1.2;margin:10px 0 0}
    h2{font-size:1.02rem;margin:0 0 10px}

    .scale-frame{width:100%;overflow:hidden}
    .scale-canvas{width:100%;transform-origin:top left}
    .layout{display:grid;grid-template-columns:390px 1fr;gap:14px;align-items:start}
    .card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:14px}
    .input-card{padding:16px}
    .small-label{font-size:.82rem;color:var(--sub);font-weight:800;letter-spacing:.04em;text-transform:uppercase}

    .target-box{display:flex;justify-content:center;margin:2px 0 14px}
    .target-card{width:min(100%,240px);background:var(--card-2);border:1px solid var(--line);border-radius:24px;padding:14px;text-align:center}
    .target-ring{width:144px;height:144px;border-radius:50%;margin:0 auto 10px;border:8px solid var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fffaf4;box-shadow:inset 0 8px 18px rgba(90,62,34,.05)}
    .target-title{font-size:.95rem;color:var(--sub);font-weight:800;margin-bottom:6px}
    .target-ring input{width:94px;text-align:center;border:none;background:transparent;padding:0;font-size:2.05rem;font-weight:900;color:var(--text)}
    .target-unit{font-size:1rem;font-weight:800;color:var(--sub);margin-top:4px}
    .hint{font-size:.9rem;color:var(--sub)}

    .input-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}
    label{display:block;font-weight:800;font-size:.94rem;margin-bottom:6px}
    input{width:100%;border:1px solid #dfd2c2;border-radius:14px;padding:12px 13px;font-size:.98rem;background:#fffdf9;color:var(--text)}
    input:focus{outline:none;border-color:#c69a68;box-shadow:0 0 0 3px rgba(184,138,83,.08)}
    input[readonly]{background:#f6f0e8;color:#70645b}
    .button-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{border:0;border-radius:14px;padding:12px 16px;font-size:.95rem;font-weight:900;color:#fff;background:var(--dark);cursor:pointer}
    button.secondary{background:#d8ccb9;color:#4d4037}

    .right-stack{display:grid;gap:12px}
    .ratio-card{padding:16px;background:var(--card-2)}
    .ratio-grid{display:grid;grid-template-columns:1fr 260px;gap:12px;align-items:center}
    .circle-card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:240px}
    .circle-stack{position:relative;display:grid;place-items:center}
    .circle{--deg:0deg;--tone:var(--gold);width:176px;height:176px;border-radius:50%;background:conic-gradient(var(--tone) 0deg,var(--tone) var(--deg),#efe3d4 var(--deg),#efe3d4 360deg);display:grid;place-items:center}
    .circle::before{content:"";width:126px;height:126px;border-radius:50%;background:#fffaf4;box-shadow:inset 0 8px 18px rgba(90,62,34,.05)}
    .circle-card.target{display:none}
    .circle-card.target .circle{--tone:var(--dark)}
    .circle-center{position:absolute;text-align:center;width:116px}
    .circle-value{font-size:2rem;line-height:1;font-weight:900}
    .circle-name{margin-top:6px;font-size:.9rem;font-weight:800;color:var(--sub)}
    .circle-note{margin-top:8px;font-size:.86rem;color:var(--sub);text-align:center}

    .summary-box{text-align:center;padding:4px 6px}
    .summary-chip{display:inline-block;padding:6px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:.76rem;font-weight:800;color:var(--gold);margin-bottom:8px;min-height:30px}
    .summary-amount{font-size:2.3rem;line-height:1.08;font-weight:900;min-height:52px;margin:6px 0}
    .summary-text{font-size:.9rem;color:var(--sub);min-height:42px}
    .summary-box.good .summary-amount{color:var(--green)}
    .summary-box.warn .summary-amount{color:var(--red)}

    .deploy-card{padding:16px;background:var(--card-2)}
    .deploy-grid{display:grid;grid-template-columns:1fr 1fr 180px;gap:10px;align-items:end}
    .deploy-result{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;text-align:center}
    .deploy-result-title{font-size:.9rem;color:var(--sub);margin-bottom:8px}
    .deploy-result-value{font-size:1.35rem;font-weight:900}

    .footer{margin-top:20px;color:#8f857d;font-size:.9rem;text-align:center}

    @media (max-width:1040px){
      .scale-canvas{width:990px}
      .summary-amount{font-size:2.3rem}
    }
    @media (max-width:680px){
      h1{font-size:1.76rem}
      .wrap{padding:12px 10px 64px}
      .hero,.section,.card{border-radius:22px}
      .hero,.section{padding:18px 14px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="banner">─── 𝓡𝓲𝓬𝓱 𝓒𝓱𝓮𝓻𝓲𝓮 ───</div>
      <div class="brand">
        <div class="brand-title">鑫彤女王 𝔛𝔦𝔫𝔱𝔬𝔫𝔤 𝔔𝔲𝔢𝔢𝔫</div>
        <div class="brand-sub">▫️ 房產投資 ▫️ 理財實戰 ▫️ 美業領航</div>
        <a class="ig-link" href="https://www.instagram.com/cherie.estilista" target="_blank" rel="noopener noreferrer"><svg class="ig-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3.5" y="3.5" width="17" height="17" rx="5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><circle cx="17.4" cy="6.6" r="1.2" fill="currentColor"/></svg>Instagram｜cherie.estilista</a>
      </div>
      <div class="hero-top">
        <div>
          <span class="pill">ARKRATION CALCULATOR</span>
          <h1>寶寶翻倍計算機</h1>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="scale-frame">
        <div class="scale-canvas" id="scaleCanvas">
          <div class="layout">
        <div class="card input-card">
          <div class="target-box">
            <div class="target-card">
              <div class="target-ring">
                <div class="target-title">建議持股比例</div>
                <input id="targetRatio" type="number" inputmode="decimal" placeholder="70" value="70" />
                <div class="target-unit">%</div>
              </div>
              <div class="hint">先輸入今天的建議持股比例，系統會自動保存。</div>
            </div>
          </div>

          <div class="input-grid">
            <div class="field">
              <label for="twStock">台股庫存市值（台幣）</label>
              <input id="twStock" type="number" inputmode="decimal" placeholder="例如：500000" />
            </div>
            <div class="field">
              <label for="usStock">美股庫存市值（台幣換算後）</label>
              <input id="usStock" type="number" inputmode="decimal" placeholder="例如：200000" />
            </div>
            <div class="field">
              <label for="cashTwd">台幣現金閒錢</label>
              <input id="cashTwd" type="number" inputmode="decimal" placeholder="例如：300000" />
            </div>
            <div class="field">
              <label for="cashUsd">美金現金閒錢</label>
              <input id="cashUsd" type="number" inputmode="decimal" placeholder="例如：10000" />
            </div>
            <div style="display:none;">
              <label for="usdToTwd">美元匯率</label>
              <input id="usdToTwd" type="number" inputmode="decimal" step="0.01" value="32" />
            </div>
          </div>

          <div class="button-row">
            <button onclick="calculateAllocation()">開始計算</button>
            <button class="secondary" onclick="resetForm()">清空重填</button>
          </div>
        </div>

        <div class="right-stack">
          <div class="card ratio-card">
            <div class="ratio-grid">
              <div class="circle-card">
                <div class="circle-stack">
                  <div class="circle" id="currentRing"></div>
                  <div class="circle-center">
                    <div class="circle-value" id="currentRatioValue">0%</div>
                    <div class="circle-name">目前持股比例</div>
                  </div>
                </div>
                <div class="circle-note">股票市值占總資產比例</div>
              </div>

              <div class="summary-box" id="centerResult">
                <div class="summary-chip" id="summaryTitle"></div>
                <div class="summary-amount" id="summaryAmount">&nbsp;</div>
                <div class="summary-text" id="summaryText"></div>
              </div>

              <div class="circle-card target" aria-hidden="true">
                <div class="circle-stack">
                  <div class="circle" id="targetRing"></div>
                  <div class="circle-center">
                    <div class="circle-value" id="targetRatioValue">70%</div>
                    <div class="circle-name">建議持股比例</div>
                  </div>
                </div>
                <div class="circle-note">目標配置比例</div>
              </div>
            </div>
          </div>

          <div class="card deploy-card">
            <div class="small-label" style="margin-bottom:12px;">DEPLOYMENT</div>
            <div class="deploy-grid">
              <div>
                <label for="deployAmountAuto" id="deployAmountLabel">可佈局金額</label>
                <input id="deployAmountAuto" type="text" readonly />
              </div>
              <div>
                <label for="deployCount">今天要佈局幾檔標的</label>
                <input id="deployCount" type="number" inputmode="numeric" placeholder="例如：10" />
              </div>
              <div class="deploy-result">
                <div class="deploy-result-title">每檔可佈局金額</div>
                <div class="deploy-result-value" id="deployPerStock">$0</div>
              </div>
            </div>
          </div>
          </div>
        </div>
      </div>
    </section>

    <div class="footer">Rich Cherie｜方舟運算工具頁</div>
  </main>

  <script>
    const STORAGE_KEY = 'ark-position-calculator-state';
    const $ = (id) => document.getElementById(id);
    const formatMoney = (value) => new Intl.NumberFormat('zh-TW', { maximumFractionDigits: 0 }).format(Math.round(value));
    const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
    const updateRing = (id, percent) => $(id).style.setProperty('--deg', (clamp(percent, 0, 100) * 3.6) + 'deg');

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        twStock: $('twStock').value,
        usStock: $('usStock').value,
        cashTwd: $('cashTwd').value,
        cashUsd: $('cashUsd').value,
        usdToTwd: $('usdToTwd').value,
        targetRatio: $('targetRatio').value,
        deployCount: $('deployCount').value
      }));
    }

    function loadState() {
      try {
        const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        $('twStock').value = s.twStock || '';
        $('usStock').value = s.usStock || '';
        $('cashTwd').value = s.cashTwd || '';
        $('cashUsd').value = s.cashUsd || '';
        $('usdToTwd').value = s.usdToTwd || '32';
        $('targetRatio').value = s.targetRatio || '70';
        $('deployCount').value = s.deployCount || '';
      } catch (e) {}
    }

    function setBlankSummary() {
      $('centerResult').className = 'summary-box';
      $('summaryTitle').textContent = '';
      $('summaryAmount').innerHTML = '&nbsp;';
      $('summaryText').textContent = '';
    }

    function updateDeployPerStock() {
      const deployAmount = Number($('deployAmountAuto').dataset.value || '0') || 0;
      const count = Number($('deployCount').value) || 0;
      const perStock = (deployAmount > 0 && count > 0) ? deployAmount / count : 0;
      $('deployPerStock').textContent = '$' + formatMoney(perStock);
      saveState();
    }

    function setDeployMode(mode, amount) {
      if (mode === 'trim') {
        $('deployAmountLabel').textContent = '建議調節金額';
        $('deployAmountAuto').value = '$' + formatMoney(amount);
        $('deployAmountAuto').dataset.value = '0';
        $('deployPerStock').textContent = '$0';
        return;
      }
      $('deployAmountLabel').textContent = '可佈局金額';
      $('deployAmountAuto').value = amount > 0 ? ('$' + formatMoney(amount)) : '';
      $('deployAmountAuto').dataset.value = String(amount > 0 ? amount : 0);
      updateDeployPerStock();
    }

    function calculateAllocation() {
      const twStock = Number($('twStock').value) || 0;
      const usStock = Number($('usStock').value) || 0;
      const cashTwd = Number($('cashTwd').value) || 0;
      const cashUsd = Number($('cashUsd').value) || 0;
      const usdToTwd = Number($('usdToTwd').value) || 0;
      const targetRatio = clamp(Number($('targetRatio').value) || 0, 0, 100);

      if ([twStock, usStock, cashTwd, cashUsd].some(v => v < 0) || usdToTwd <= 0) {
        $('centerResult').className = 'summary-box warn';
        $('summaryTitle').textContent = '請先確認輸入數值';
        $('summaryAmount').textContent = '$0';
        $('summaryText').textContent = '現金、庫存市值不可為負數，匯率需大於 0。';
        setDeployMode('deploy', 0);
        return;
      }

      const stock = twStock + usStock;
      const totalCash = cashTwd + (cashUsd * usdToTwd);
      const total = stock + totalCash;
      const currentRatio = total > 0 ? (stock / total) * 100 : 0;
      const targetStockValue = total * (targetRatio / 100);
      const difference = targetStockValue - stock;
      const deployAmount = difference > 0 ? difference : 0;
      const trimAmount = difference < 0 ? Math.abs(difference) : 0;

      $('currentRatioValue').textContent = currentRatio.toFixed(1) + '%';
      $('targetRatioValue').textContent = targetRatio.toFixed(1) + '%';
      updateRing('currentRing', currentRatio);
      updateRing('targetRing', targetRatio);
      saveState();

      if (total === 0) {
        setDeployMode('deploy', 0);
        setBlankSummary();
        return;
      }

      if (Math.abs(difference) < 0.5) {
        setDeployMode('deploy', 0);
        $('centerResult').className = 'summary-box good';
        $('summaryTitle').textContent = '目前剛好貼近建議持股比例';
        $('summaryAmount').textContent = '$0';
        $('summaryText').textContent = '現在不需要額外布局，也不需要調節。';
        return;
      }

      if (deployAmount > 0) {
        setDeployMode('deploy', deployAmount);
        $('centerResult').className = 'summary-box good';
        $('summaryTitle').textContent = '現在可以布局的金額';
        $('summaryAmount').textContent = '$' + formatMoney(deployAmount);
        $('summaryText').textContent = '這個金額就是你現在還可以佈局的股票市值。';
        return;
      }

      setDeployMode('trim', trimAmount);
      $('centerResult').className = 'summary-box warn';
      $('summaryTitle').textContent = '現在需要調節的金額';
      $('summaryAmount').textContent = '$' + formatMoney(trimAmount);
      $('summaryText').textContent = '這個金額就是你現在需要調節的股票市值。';
    }

    function resetForm() {
      $('twStock').value = '';
      $('usStock').value = '';
      $('cashTwd').value = '';
      $('cashUsd').value = '';
      $('usdToTwd').value = '32';
      $('targetRatio').value = '70';
      $('deployCount').value = '';
      localStorage.removeItem(STORAGE_KEY);
      $('deployAmountLabel').textContent = '可佈局金額';
      $('deployAmountAuto').value = '';
      $('deployAmountAuto').dataset.value = '0';
      $('deployPerStock').textContent = '$0';
      $('currentRatioValue').textContent = '0%';
      $('targetRatioValue').textContent = '70%';
      updateRing('currentRing', 0);
      updateRing('targetRing', 70);
      setBlankSummary();
    }

    async function loadLiveFxRate() {
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        if (data?.rates?.TWD) $('usdToTwd').value = Number(data.rates.TWD).toFixed(2);
        saveState();
      } catch (e) {}
    }

    document.addEventListener('input', (e) => {
      if (e.target.matches('#twStock, #usStock, #cashTwd, #cashUsd, #usdToTwd, #targetRatio, #deployCount')) {
        if (e.target.id === 'targetRatio') {
          const tr = clamp(Number(e.target.value) || 0, 0, 100);
          $('targetRatioValue').textContent = tr.toFixed(1) + '%';
          updateRing('targetRing', tr);
        }
        if (e.target.id === 'deployCount') updateDeployPerStock();
        saveState();
      }
    });

    function updateMobileScale() {
      const canvas = $('scaleCanvas');
      if (!canvas) return;
      const frame = canvas.parentElement;
      if (window.innerWidth > 1040) {
        canvas.style.transform = 'scale(1)';
        frame.style.height = 'auto';
        return;
      }
      const baseWidth = 990;
      const available = frame.clientWidth;
      const scale = Math.min(1, available / baseWidth);
      canvas.style.transform = `scale(${scale})`;
      frame.style.height = (canvas.scrollHeight * scale) + 'px';
    }

    function initializePage() {
      loadState();
      $('deployAmountLabel').textContent = '可佈局金額';
      $('deployAmountAuto').value = '';
      $('deployAmountAuto').dataset.value = '0';
      $('deployPerStock').textContent = '$0';
      const tr = clamp(Number($('targetRatio').value) || 70, 0, 100);
      $('targetRatioValue').textContent = tr.toFixed(1) + '%';
      updateRing('targetRing', tr);
      $('currentRatioValue').textContent = '0%';
      updateRing('currentRing', 0);
      setBlankSummary();
      updateMobileScale();
    }

    window.addEventListener('resize', updateMobileScale);
    initializePage();
    loadLiveFxRate().finally(updateMobileScale);
  </script>
</body>
</html>
