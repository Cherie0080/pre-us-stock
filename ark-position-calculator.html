<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>方舟持股比例計算機｜Rich Cherie</title>
  <meta name="description" content="方舟持股比例計算機：輸入台股庫存、美股庫存、台幣現金與美金現金，自動換算目前持股比例、建議持股比例、可佈局金額與每檔配置金額。" />
  <meta property="og:title" content="方舟持股比例計算機｜Rich Cherie" />
  <meta property="og:description" content="卡片式版面，快速查看目前持股比例、建議持股比例、可佈局金額與每檔可佈局金額。" />
  <meta property="og:type" content="website" />
  <style>
    :root{
      --bg:#f7f3ec;
      --paper:#fffaf4;
      --card:#ffffff;
      --card-soft:#fff8f0;
      --text:#171513;
      --sub:#726a62;
      --line:#eadbca;
      --gold:#b58a55;
      --gold-soft:#f5e6d1;
      --dark:#231f1c;
      --green:#158052;
      --green-soft:#eef9f3;
      --red:#c8242f;
      --red-soft:#fff3f4;
      --shadow:0 16px 34px rgba(80,56,30,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:linear-gradient(180deg,#fdf9f3 0%,#f7f3ec 100%);color:var(--text);line-height:1.7}
    .wrap{max-width:1100px;margin:0 auto;padding:16px 12px 72px}
    .hero,.section{background:var(--paper);border:1px solid var(--line);border-radius:28px;padding:22px 18px}
    .hero{box-shadow:var(--shadow)}
    .section{margin-top:18px}
    .banner{display:block;text-align:center;padding:10px 14px;margin-bottom:12px;border-radius:999px;background:linear-gradient(135deg,#fff8ef 0%,#f2dfc7 100%);border:1px solid var(--line);color:#9a6b3d;font-weight:800;letter-spacing:.08em}
    .brand{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:24px;padding:16px;margin-bottom:16px}
    .brand-title{font-size:1.12rem;font-weight:800;margin-bottom:8px}
    .brand-sub{color:var(--sub);margin-bottom:6px}
    .ig-link{display:inline-flex;align-items:center;gap:8px;margin-top:10px;padding:10px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);color:#8a5b2f;font-weight:700;text-decoration:none}
    .ig-icon{width:18px;height:18px}
    .pill{display:inline-block;padding:7px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--gold);font-size:.82rem;font-weight:800;letter-spacing:.06em}
    h1{font-size:2rem;line-height:1.2;margin:14px 0 0}
    h2{font-size:1.18rem;margin:0 0 12px}

    .layout{display:grid;grid-template-columns:1.02fr .98fr;gap:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px}
    .target-box{display:flex;justify-content:center;margin-bottom:18px}
    .target-card{width:min(100%,300px);text-align:center;background:var(--card-soft);border:1px solid var(--line);border-radius:28px;padding:18px}
    .target-ring{width:168px;height:168px;border-radius:50%;border:10px solid var(--dark);margin:0 auto 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fffdf9;box-shadow:inset 0 6px 18px rgba(80,56,30,.05)}
    .target-label{font-size:.94rem;color:var(--sub);font-weight:800;margin-bottom:6px}
    .target-ring input{width:92px;text-align:center;border:none;background:transparent;padding:0;font-size:2rem;font-weight:900;color:var(--text)}
    .target-unit{font-size:1rem;font-weight:800;color:var(--sub);margin-top:4px}
    .hint{font-size:.9rem;color:var(--sub)}

    .input-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    label{display:block;font-weight:800;font-size:1rem;margin-bottom:8px}
    input{width:100%;border:1px solid #d9d0c0;border-radius:16px;padding:16px;font-size:1.03rem;background:#fffdf9}
    input[readonly]{background:#f4efe9;color:#726a62}
    .button-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button{border:0;border-radius:16px;padding:16px 18px;font-size:1rem;font-weight:900;color:#fff;background:var(--dark);cursor:pointer}
    button.secondary{background:#d8ccb9;color:#4d4037}

    .dashboard-card{display:flex;flex-direction:column;gap:16px}
    .rings{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center}
    .ring-panel{background:var(--card-soft);border:1px solid var(--line);border-radius:24px;padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px}
    .ring-stack{position:relative;display:grid;place-items:center}
    .ring{--deg:0deg;--tone:var(--gold);width:210px;height:210px;border-radius:50%;background:conic-gradient(var(--tone) 0deg,var(--tone) var(--deg),#eee2d3 var(--deg),#eee2d3 360deg);display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(181,138,85,.1)}
    .ring::before{content:"";width:150px;height:150px;border-radius:50%;background:#fffaf4;box-shadow:inset 0 6px 20px rgba(80,56,30,.06)}
    .ring-panel.target .ring{--tone:#231f1c}
    .ring-center{position:absolute;text-align:center;width:140px}
    .ring-value{font-size:2.5rem;line-height:1;font-weight:900}
    .ring-name{margin-top:8px;font-size:.95rem;font-weight:800;color:var(--sub)}
    .ring-note{margin-top:12px;font-size:.92rem;color:var(--sub);text-align:center}

    .center-box{text-align:center;min-width:240px;padding:8px}
    .center-title{min-height:24px;font-size:1rem;font-weight:900;color:var(--sub)}
    .center-amount{min-height:56px;font-size:2.7rem;font-weight:900;line-height:1.1;margin:8px 0;color:var(--dark)}
    .center-text{min-height:44px;font-size:.94rem;color:var(--sub)}
    .center-box.good .center-amount{color:var(--green)}
    .center-box.warn .center-amount{color:var(--red)}

    .deploy-card{background:var(--card-soft);border:1px solid var(--line);border-radius:24px;padding:18px}
    .deploy-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;align-items:end}
    .deploy-result{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff;text-align:center}
    .deploy-result-title{font-size:.9rem;color:var(--sub);margin-bottom:8px}
    .deploy-result-value{font-size:1.3rem;font-weight:900}

    .footer{margin-top:20px;color:#8f857d;font-size:.9rem;text-align:center}

    @media (max-width:980px){
      .layout,.input-grid,.deploy-grid{grid-template-columns:1fr}
      .rings{grid-template-columns:1fr}
      .center-box{min-width:auto}
      .ring-panel{min-height:auto}
      .target-card{width:100%}
    }
    @media (max-width:680px){
      h1{font-size:1.76rem}
      .wrap{padding:12px 10px 64px}
      .hero,.section{padding:18px 14px;border-radius:22px}
      .ring{width:190px;height:190px}
      .ring::before{width:136px;height:136px}
      .ring-value{font-size:2.2rem}
      .center-amount{font-size:2.1rem}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="banner">─── 𝓡𝓲𝓬𝓱 𝓒𝓱𝓮𝓻𝓲𝓮 ───</div>
      <div class="brand">
        <div class="brand-title">鑫彤女王 𝔛𝔦𝔫𝔱𝔬𝔫𝔤 𝔔𝔲𝔢𝔢𝔫</div>
        <div class="brand-sub">▫️ 房產投資 ▫️ 理財實戰 ▫️ 美業領航</div>
        <a class="ig-link" href="https://www.instagram.com/cherie.estilista" target="_blank" rel="noopener noreferrer"><svg class="ig-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3.5" y="3.5" width="17" height="17" rx="5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><circle cx="17.4" cy="6.6" r="1.2" fill="currentColor"/></svg>Instagram｜cherie.estilista</a>
      </div>
      <div>
        <span class="pill">ARK POSITION CALCULATOR</span>
        <h1>方舟持股比例計算機</h1>
      </div>
    </section>

    <section class="section">
      <div class="layout">
        <div class="card">
          <h2>一、輸入區</h2>
          <div class="target-box">
            <div class="target-card">
              <div class="target-ring">
                <div class="target-label">建議持股比例</div>
                <input id="targetRatio" type="number" inputmode="decimal" placeholder="70" value="70" />
                <div class="target-unit">%</div>
              </div>
              <div class="hint">第一步先輸入今天要的建議持股比例，系統會自動保存。</div>
            </div>
          </div>

          <div class="input-grid">
            <div>
              <label for="twStock">台股庫存市值（台幣）</label>
              <input id="twStock" type="number" inputmode="decimal" placeholder="例如：500000" />
            </div>
            <div>
              <label for="usStock">美股庫存市值（台幣換算後）</label>
              <input id="usStock" type="number" inputmode="decimal" placeholder="例如：200000" />
            </div>
            <div>
              <label for="cashTwd">台幣現金閒錢</label>
              <input id="cashTwd" type="number" inputmode="decimal" placeholder="例如：300000" />
            </div>
            <div>
              <label for="cashUsd">美金現金閒錢</label>
              <input id="cashUsd" type="number" inputmode="decimal" placeholder="例如：10000" />
            </div>
            <div style="display:none;">
              <label for="usdToTwd">美元匯率</label>
              <input id="usdToTwd" type="number" inputmode="decimal" step="0.01" value="32" />
            </div>
          </div>

          <div class="button-row">
            <button onclick="calculateAllocation()">開始計算</button>
            <button class="secondary" onclick="resetForm()">清空重填</button>
          </div>
        </div>

        <div class="dashboard-card">
          <div class="card">
            <div class="rings">
              <div class="ring-panel">
                <div class="ring-stack">
                  <div class="ring" id="currentRing"></div>
                  <div class="ring-center">
                    <div class="ring-value" id="currentRatioValue">0%</div>
                    <div class="ring-name">目前持股比例</div>
                  </div>
                </div>
                <div class="ring-note">股票市值占總資產比例</div>
              </div>

              <div class="center-box" id="centerResult">
                <div class="center-title" id="summaryTitle"></div>
                <div class="center-amount" id="summaryAmount">&nbsp;</div>
                <div class="center-text" id="summaryText"></div>
              </div>

              <div class="ring-panel target">
                <div class="ring-stack">
                  <div class="ring" id="targetRing"></div>
                  <div class="ring-center">
                    <div class="ring-value" id="targetRatioValue">70%</div>
                    <div class="ring-name">建議持股比例</div>
                  </div>
                </div>
                <div class="ring-note">目標配置比例</div>
              </div>
            </div>
          </div>

          <div class="deploy-card">
            <h2>二、今日佈局試算</h2>
            <div class="deploy-grid">
              <div>
                <label for="deployAmountAuto">可佈局金額</label>
                <input id="deployAmountAuto" type="text" readonly />
              </div>
              <div>
                <label for="deployCount">今天要佈局幾檔標的</label>
                <input id="deployCount" type="number" inputmode="numeric" placeholder="例如：10" />
              </div>
              <div class="deploy-result">
                <div class="deploy-result-title">每檔可佈局金額</div>
                <div class="deploy-result-value" id="deployPerStock">$0</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="footer">Rich Cherie｜方舟運算工具頁</div>
  </main>

  <script>
    const STORAGE_KEY = 'ark-position-calculator-state';
    const $ = (id) => document.getElementById(id);
    const formatMoney = (value) => new Intl.NumberFormat('zh-TW', { maximumFractionDigits: 0 }).format(Math.round(value));
    const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
    const updateRing = (id, percent) => $(id).style.setProperty('--deg', (clamp(percent, 0, 100) * 3.6) + 'deg');

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        twStock: $('twStock').value,
        usStock: $('usStock').value,
        cashTwd: $('cashTwd').value,
        cashUsd: $('cashUsd').value,
        usdToTwd: $('usdToTwd').value,
        targetRatio: $('targetRatio').value,
        deployCount: $('deployCount').value
      }));
    }

    function loadState() {
      try {
        const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        $('twStock').value = s.twStock || '';
        $('usStock').value = s.usStock || '';
        $('cashTwd').value = s.cashTwd || '';
        $('cashUsd').value = s.cashUsd || '';
        $('usdToTwd').value = s.usdToTwd || '32';
        $('targetRatio').value = s.targetRatio || '70';
        $('deployCount').value = s.deployCount || '';
      } catch (e) {}
    }

    function setBlankSummary() {
      $('centerResult').className = 'center-box';
      $('summaryTitle').textContent = '';
      $('summaryAmount').innerHTML = '&nbsp;';
      $('summaryText').textContent = '';
    }

    function updateDeployPerStock() {
      const deployAmount = Number($('deployAmountAuto').dataset.value || '0') || 0;
      const count = Number($('deployCount').value) || 0;
      const perStock = (deployAmount > 0 && count > 0) ? deployAmount / count : 0;
      $('deployPerStock').textContent = '$' + formatMoney(perStock);
      saveState();
    }

    function calculateAllocation() {
      const twStock = Number($('twStock').value) || 0;
      const usStock = Number($('usStock').value) || 0;
      const cashTwd = Number($('cashTwd').value) || 0;
      const cashUsd = Number($('cashUsd').value) || 0;
      const usdToTwd = Number($('usdToTwd').value) || 0;
      const targetRatio = clamp(Number($('targetRatio').value) || 0, 0, 100);

      if ([twStock, usStock, cashTwd, cashUsd].some(v => v < 0) || usdToTwd <= 0) {
        $('centerResult').className = 'center-box warn';
        $('summaryTitle').textContent = '請先確認輸入數值';
        $('summaryAmount').textContent = '$0';
        $('summaryText').textContent = '現金、庫存市值不可為負數，匯率需大於 0。';
        $('deployAmountAuto').value = '$0';
        $('deployAmountAuto').dataset.value = '0';
        updateDeployPerStock();
        return;
      }

      const stock = twStock + usStock;
      const totalCash = cashTwd + (cashUsd * usdToTwd);
      const total = stock + totalCash;
      const currentRatio = total > 0 ? (stock / total) * 100 : 0;
      const targetStockValue = total * (targetRatio / 100);
      const difference = targetStockValue - stock;
      const deployAmount = difference > 0 ? difference : 0;
      const trimAmount = difference < 0 ? Math.abs(difference) : 0;

      $('currentRatioValue').textContent = currentRatio.toFixed(1) + '%';
      $('targetRatioValue').textContent = targetRatio.toFixed(1) + '%';
      updateRing('currentRing', currentRatio);
      updateRing('targetRing', targetRatio);
      saveState();

      if (total === 0) {
        $('deployAmountAuto').value = '';
        $('deployAmountAuto').dataset.value = '0';
        updateDeployPerStock();
        setBlankSummary();
        return;
      }

      if (Math.abs(difference) < 0.5) {
        $('deployAmountAuto').value = '$0';
        $('deployAmountAuto').dataset.value = '0';
        updateDeployPerStock();
        $('centerResult').className = 'center-box good';
        $('summaryTitle').textContent = '目前剛好貼近建議持股比例';
        $('summaryAmount').textContent = '$0';
        $('summaryText').textContent = '現在不需要額外布局，也不需要調節。';
        return;
      }

      if (deployAmount > 0) {
        $('deployAmountAuto').value = '$' + formatMoney(deployAmount);
        $('deployAmountAuto').dataset.value = String(deployAmount);
        updateDeployPerStock();
        $('centerResult').className = 'center-box good';
        $('summaryTitle').textContent = '現在可以布局的金額';
        $('summaryAmount').textContent = '$' + formatMoney(deployAmount);
        $('summaryText').textContent = '這個金額就是你現在還可以佈局的股票市值。';
        return;
      }

      $('deployAmountAuto').value = '$0';
      $('deployAmountAuto').dataset.value = '0';
      updateDeployPerStock();
      $('centerResult').className = 'center-box warn';
      $('summaryTitle').textContent = '現在需要調節的金額';
      $('summaryAmount').textContent = '$' + formatMoney(trimAmount);
      $('summaryText').textContent = '這個金額就是你現在需要調節的股票市值。';
    }

    function resetForm() {
      $('twStock').value = '';
      $('usStock').value = '';
      $('cashTwd').value = '';
      $('cashUsd').value = '';
      $('usdToTwd').value = '32';
      $('targetRatio').value = '70';
      $('deployCount').value = '';
      localStorage.removeItem(STORAGE_KEY);
      $('deployAmountAuto').value = '';
      $('deployAmountAuto').dataset.value = '0';
      $('deployPerStock').textContent = '$0';
      $('currentRatioValue').textContent = '0%';
      $('targetRatioValue').textContent = '70%';
      updateRing('currentRing', 0);
      updateRing('targetRing', 70);
      setBlankSummary();
    }

    async function loadLiveFxRate() {
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        if (data?.rates?.TWD) $('usdToTwd').value = Number(data.rates.TWD).toFixed(2);
        saveState();
      } catch (e) {}
    }

    document.addEventListener('input', (e) => {
      if (e.target.matches('#twStock, #usStock, #cashTwd, #cashUsd, #usdToTwd, #targetRatio, #deployCount')) {
        if (e.target.id === 'targetRatio') {
          const tr = clamp(Number(e.target.value) || 0, 0, 100);
          $('targetRatioValue').textContent = tr.toFixed(1) + '%';
          updateRing('targetRing', tr);
        }
        if (e.target.id === 'deployCount') updateDeployPerStock();
        saveState();
      }
    });

    function initializePage() {
      loadState();
      $('deployAmountAuto').value = '';
      $('deployAmountAuto').dataset.value = '0';
      $('deployPerStock').textContent = '$0';
      const tr = clamp(Number($('targetRatio').value) || 70, 0, 100);
      $('targetRatioValue').textContent = tr.toFixed(1) + '%';
      updateRing('targetRing', tr);
      $('currentRatioValue').textContent = '0%';
      updateRing('currentRing', 0);
      setBlankSummary();
    }

    initializePage();
    loadLiveFxRate();
  </script>
</body>
</html>
